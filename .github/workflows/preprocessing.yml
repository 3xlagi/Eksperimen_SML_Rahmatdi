name: Automate Data Preprocessing

on:
  push:
    branches:
      - main 
    paths:
      - 'data_raw/**'
      - 'preprocessing/automate_*.py'
      - '.github/workflows/preprocessing.yml'

jobs:
  preprocess_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Automation Script
      run: |
        python preprocessing/automate_Rahmatdi.py
        
    - name: Commit and Push Clean Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data_clean/Data_Cleaned.csv
        git commit -m "Auto-process: Generate clean dataset" || echo "No changes to commit"
        git push